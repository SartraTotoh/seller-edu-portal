    <script>

                keywords: "pic, classroom, centralize, assignment, owner, ผู้รับผิดชอบ, ห้องเรียน, ผู้ดูแล, งานกลาง"
            },

            },

                url: "https://docs.google.com/spreadsheets/d/1RAHfhtzuLCoB_lssKvlBKfxH0pv-S4cIlYCqAEAQ3aI/edit?usp=sharing",

                objective: "[TH] แดชบอร์ด (Datasuite) สรุปผลตัวเลขและประสิทธิภาพของช่องทาง SEH [EN] Datasuite dashboard for SEH channel communication performance and traffic analytics.",
                keywords: "performance, datasuite, dashboard, analytics, metrics, seh, สรุปผล, แดชบอร์ด, ยอดวิว, ประสิทธิภาพ"
            },
            {
                category: "Seller Comms",
                title: "PN Request Tracker 2026",
                url: "https://docs.google.com/spreadsheets/d/1jCcfx0NExSfAzyj9a_lFYlIu3Re6qor9TIzaDATX7go/edit?usp=sharing",
                objective: "[TH] ระบบติดตามคิวและสถานะการส่ง Push Notification (PN) ถึงผู้ขายปี 2026 [EN] Push Notification (PN) submission queue and request status tracker for 2026.",
                keywords: "pn, push notification, request tracker, alert, ยิงแจ้งเตือน, ส่งข้อความ, แจ้งเตือนผู้ขาย, ติดตามสถานะ"
            },
            {
                category: "Seller Comms",
                title: "SC Request Tracker 2026",
                url: "https://docs.google.com/spreadsheets/d/1f7ZFeR4a3fnQUBm3kOeoW7wLXRFKjvsIMpCOCu6teMI/edit?usp=sharing",
                objective: "[TH] ระบบติดตามคิวคำขอส่งข่าวสารผ่านช่องทาง Seller Centre (SC) Notification [EN] Request status tracker for Seller Centre (SC) system notifications.",
                keywords: "sc, seller centre, notification, tracker, ระบบติดตาม, ข้อความในระบบ, แจ้งข่าวผู้ขาย"
            },
            {
                category: "Seller Comms",
                title: "PN Performance Result",
                url: "https://docs.google.com/spreadsheets/d/1LbC_DWOuDhQvAMIonQttDJY6LMjjQG2PaLeZrmmy97I/edit?usp=sharing",
                objective: "[TH] สรุปสถิติจราจรและประสิทธิภาพการยิง PN (Open Rate, CTR) [EN] PN performance metrics report, including Open Rates and Click-Through Rates (CTR).",
                keywords: "pn result, ctr, open rate, performance, ตัวเลข, สรุปผล pn, สถิติจราจร, ผลตอบรับ"
            },
            {
                category: "Seller Comms",
                title: "[Urgent comms] Pharmacy Comms",
                url: "https://docs.google.com/spreadsheets/d/1EFBFWdnlhELBr8OJFpmzw5pY2GCmOnmce_KHZQblBpA/edit?usp=sharing",
                objective: "[TH] แผนงานและระบบติดตามการสื่อสารเร่งด่วนสำหรับกลุ่มร้านขายยา/เวชภัณฑ์ [EN] Urgent communication plan and broadcast tracker for Pharmacy & Medical sellers.",
                keywords: "urgent, pharmacy, medical, ยา, สื่อสารเร่งด่วน, ประกาศด่วน, ร้านยา, เวชภัณฑ์, เคสด่วน"
            },
            {
                category: "Seller Comms",
                title: "[Urgent comms] Instant & Express Delivery",
                url: "https://docs.google.com/spreadsheets/d/19_2_T6FK0_Ep7ygx-ypm0p5dky7crANQLVrAhiZmXog/edit?usp=sharing",
                objective: "[TH] แผนงานและระบบติดตามการสื่อสารเร่งด่วนเกี่ยวกับระบบขนส่งด่วน [EN] Urgent communication plan and tracker regarding Instant / Express Delivery updates.",
                keywords: "urgent, delivery, instant, express, ขนส่ง, ด่วน, ส่งไว, ขนส่งด่วน, สื่อสารเร่งด่วน, ขนส่งมีปัญหา"
            }
        ];

        let allLinksData = [...backupData];

        async function initPortal() {
            const statusEl = document.getElementById("connectionStatus");
            try {
                // หากมีการนำ URL เผยแพร่จริงจาก Google Sheet มาใส่ จะทำการดึงข้อมูลสดทันที
                if(!googleSheetCsvUrl.includes("YOUR_SHEET_ID_HERE")) {
                    const response = await fetch(googleSheetCsvUrl);
                    if(response.ok) {
                        const csvText = await response.text();
                        allLinksData = parseCsv(csvText);
                        statusEl.innerText = "เชื่อมต่อฐานข้อมูล Google Sheet สำเร็จ (Live Data)";
                        statusEl.parentElement.classList.remove("text-slate-600");
                        statusEl.parentElement.classList.add("text-emerald-600");
                    } else {
                        throw new Error("CSV Response not ok");
                    }
                } else {
                    statusEl.innerText = "ใช้งานระบบด้วย Local Backup Data (พร้อมเชื่อมต่อ Sheet หลังบ้าน)";
                }
            } catch (e) {
                console.warn("ดึงข้อมูลจาก Sheet ไม่สำเร็จ, ใช้ข้อมูลสำรองแทน:", e);
                statusEl.innerText = "ใช้งานระบบด้วย Local Backup Data (ดึงข้อมูลสดไม่สำเร็จ)";
            }
            renderLinks(allLinksData);
        }

        // ตัวแยกแยะข้อความ CSV แบบซับซ้อน ป้องกัน Comma ในช่องข้อความหลุด
        function parseCsv(text) {
            const lines = text.split(/\r?\n/);
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                // ใช้ Regex ในการตัดคำเพื่อรองรับข้อความที่มีเครื่องหมายอัญประกาศครอบครอบไว้
                const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(",");
                const cleanCols = matches.map(col => col.replace(/^"|"$/g, '').trim());
                
                if (cleanCols.length >= 5) {
                    result.push({
                        category: cleanCols[0],
                        title: cleanCols[1],
                        url: cleanCols[2],
                        objective: cleanCols[3],
                        keywords: cleanCols[4]
                    });
                }
            }
            return result.length > 0 ? result : backupData;
        }

        function renderLinks(data) {
            const container = document.getElementById("linksContainer");
            container.innerHTML = "";

            if(data.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-xl border border-dashed border-slate-200">
                        <i class="fa-solid fa-folder-open text-slate-300 text-4xl mb-3"></i>
                        <p class="text-slate-500 font-medium">ไม่พบลิงก์หรือเครื่องมือที่ค้นหา</p>
                        <p class="text-slate-400 text-xs mt-1">ลองเปลี่ยนคำค้นหาหรือเช็คตัวสะกดอีกครั้ง</p>
                    </div>
                `;
                return;
            }

            // จัดกลุ่มข้อมูลตามหมวดหมู่
            const groups = {};
            data.forEach(item => {
                if(!groups[item.category]) groups[item.category] = [];
                groups[item.category].push(item);
            });

            // สร้าง Element สไตล์การ์ดแยกตามหมวดหมู่
            for(const category in groups) {
                const card = document.createElement("div");
                card.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between";
                
                // สีและไอคอนแยกตามความเหมาะสมของหมวดหมู่ Shopee
                let iconHtml = '<i class="fa-solid fa-link text-slate-400"></i>';
                if(category.includes("Edu")) iconHtml = '<i class="fa-solid fa-book-open text-amber-500"></i>';
                else if(category.includes("Training")) iconHtml = '<i class="fa-solid fa-chalkboard-user text-blue-500"></i>';
                else if(category.includes("Channel")) iconHtml = '<i class="fa-solid fa-bullhorn text-purple-500"></i>';
                else if(category.includes("Comms")) iconHtml = '<i class="fa-solid fa-paper-plane text-orange-500"></i>';

                let contentHtml = `
                    <div>
                        <div class="flex items-center gap-2 mb-4 border-b border-slate-50 pb-3">
                            <span class="text-lg">${iconHtml}</span>
                            <h2 class="font-bold text-base text-slate-700 tracking-tight">${category}</h2>
                        </div>
                        <div class="space-y-2.5">
                `;

                groups[category].forEach(item => {
                    const isUrgent = item.title.toLowerCase().includes("urgent");
                    const badgeClass = isUrgent ? "bg-rose-50 text-rose-600 border border-rose-100 animate-pulse" : "bg-slate-50 text-slate-600 group-hover:bg-orange-50";
                    
                    contentHtml += `
                        <a href="${item.url}" target="_blank" class="block p-3 rounded-xl hover:bg-gradient-to-r hover:from-orange-50 hover:to-orange-100/50 group transition-all duration-200 border border-transparent hover:border-orange-200 shadow-sm bg-slate-50/50">
                            <div class="flex justify-between items-start gap-2 mb-1.5">
                                <span class="font-semibold text-sm text-slate-800 group-hover:text-[#EE4D2D] transition-colors leading-snug">${item.title}</span>
                                <span class="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded ${badgeClass}">
                                    ${isUrgent ? 'Urgent' : 'Open'}
                                </span>
                            </div>
                            <p class="text-xs text-slate-500 leading-relaxed">${item.objective}</p>
                        </a>
                    `;
                });

                contentHtml += `</div></div>`;
                card.innerHTML = contentHtml;
                container.appendChild(card);
            }
        }

        // ควบคุมระบบค้นหาแบบ Real-time
        document.getElementById("searchBar").addEventListener("input", (e) => {
            const word = e.target.value.toLowerCase().trim();
            if(!word) {
                renderLinks(allLinksData);
                return;
            }
            const filtered = allLinksData.filter(item => 
                item.title.toLowerCase().includes(word) ||
                item.category.toLowerCase().includes(word) ||
                item.objective.toLowerCase().includes(word) ||
                item.keywords.toLowerCase().includes(word)
            );
            renderLinks(filtered);
        });

        // สั่งให้ระบบเริ่มทำงาน
        initPortal();
    </script>
</body>
</html>
