<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee BD Infrastructure Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { shopee: '#EE4D2D', shopeeOrange: '#FF5722' }, fontFamily: { sans: ['Inter', 'Noto Sans Thai', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { background-color: #090d16; overflow-x: hidden; position: relative; background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 0); background-size: 32px 32px; }
        .liquid-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.07); }
        .liquid-glass-header { background: rgba(9, 13, 22, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
        .card-hover { transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1); }
        .card-hover:hover { transform: translateY(-5px); border-color: rgba(238, 77, 45, 0.4); box-shadow: 0 15px 35px rgba(238, 77, 45, 0.15); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="font-sans antialiased text-slate-200">

    <header class="liquid-glass-header sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-white/5 p-2 rounded-xl border border-white/10 flex items-center justify-center">
                    <svg viewBox="0 0 24 24" class="w-full h-full fill-[#EE4D2D]"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-white">Shopee Seller Edu <span class="text-shopee text-xs font-bold">Portal</span></h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest">Secured Internal Directory</p>
                </div>
            </div>
            <div class="relative w-full md:w-1/3">
                <input type="text" id="searchBar" placeholder="ค้นหาเครื่องมือ..." class="w-full pl-12 pr-4 py-3 bg-white/5 border border-white/10 rounded-2xl focus:outline-none focus:border-shopee text-white">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="mb-10 flex justify-between items-center liquid-glass p-4 rounded-2xl">
            <div class="flex items-center gap-3">
                <div class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></div>
                <p class="text-xs text-slate-300" id="statusText">กำลังตรวจสอบสิทธิ์ความปลอดภัยและซิงค์ข้อมูล...</p>
            </div>
        </div>

        <div class="mb-12 max-w-4xl mx-auto" id="topCategorySection"></div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start" id="bottomCategoriesGrid"></div>
    </main>

    <script>
        let allLinks = [];

        function generateCardsHTML(items) {
            return items.map(item => {
                let finalUrl = item.url || '#';
                if (finalUrl !== '#' && !finalUrl.startsWith('http')) finalUrl = 'https://' + finalUrl;
                return `
                    <a href="${finalUrl}" target="_blank" class="card-hover block liquid-glass p-5 rounded-2xl border border-white/5 group">
                        <div class="flex justify-between items-start gap-3 mb-2">
                            <h3 class="font-bold text-sm text-white group-hover:text-shopee transition-colors">${item.title}</h3>
                            <i class="fa-solid fa-arrow-up-right-from-square text-slate-600 text-[10px]"></i>
                        </div>
                        <p class="text-xs text-slate-400 line-clamp-2">${item.objective || '-'}</p>
                    </a>
                `;
            }).join('');
        }

        function renderLayout(data) {
            const topSection = document.getElementById('topCategorySection');
            const bottomGrid = document.getElementById('bottomCategoriesGrid');
            if (!topSection || !bottomGrid) return;
            
            topSection.innerHTML = '';
            bottomGrid.innerHTML = '';

            const topItems = data.filter(item => item.category.trim().toLowerCase() === 'seller edu');
            const trainingItems = data.filter(item => item.category.trim().toLowerCase() === 'training');
            const channelItems = data.filter(item => item.category.trim().toLowerCase() === 'channel');
            const commsItems = data.filter(item => item.category.trim().toLowerCase().includes('comm'));

            if (topItems.length > 0) {
                topSection.innerHTML = `<div class="flex flex-col gap-4"><div class="text-center font-bold text-slate-200">Seller Edu</div><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${generateCardsHTML(topItems)}</div></div>`;
            }
            if (trainingItems.length > 0) {
                const col = document.createElement('div'); col.className = "flex flex-col gap-4";
                col.innerHTML = `<div class="font-bold text-slate-300">Training</div><div class="grid gap-4">${generateCardsHTML(trainingItems)}</div>`;
                bottomGrid.appendChild(col);
            }
            if (channelItems.length > 0) {
                const col = document.createElement('div'); col.className = "flex flex-col gap-4";
                col.innerHTML = `<div class="font-bold text-slate-300">Channel</div><div class="grid gap-4">${generateCardsHTML(channelItems)}</div>`;
                bottomGrid.appendChild(col);
            }
            if (commsItems.length > 0) {
                const col = document.createElement('div'); col.className = "flex flex-col gap-4";
                col.innerHTML = `<div class="font-bold text-slate-300">Seller Comms</div><div class="grid gap-4">${generateCardsHTML(commsItems)}</div>`;
                bottomGrid.appendChild(col);
            }
        }

        // 🔒 ดึงข้อมูลผ่านระบบหลังบ้านของ Google Apps Script โดยตรง ไม่ผ่านลิงก์สาธารณะ
        function loadDataFromServer() {
            google.script.run
                .withSuccessHandler(function(data) {
                    allLinks = data;
                    renderLayout(allLinks);
                    document.getElementById('statusText').innerText = "เข้าสู่ระบบสำเร็จ: ซิงค์ฐานข้อมูลความปลอดภัยเรียบร้อย";
                    document.getElementById('statusText').className = "text-xs font-semibold text-emerald-400";
                })
                .withFailureHandler(function(err) {
                    document.getElementById('statusText').innerText = "ปฏิเสธการเข้าถึง: คุณไม่มีสิทธิ์ในฐานข้อมูลนี้";
                    document.getElementById('statusText').className = "text-xs font-semibold text-rose-400";
                })
                .getSheetData();
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('searchBar').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allLinks.filter(l => l.title.toLowerCase().includes(term) || l.category.toLowerCase().includes(term));
                renderLayout(filtered);
            });
            loadDataFromServer();
        });
    </script>
</body>
</html>
